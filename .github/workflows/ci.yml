name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify LoopPilot (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation suite
        run: npm test

      - name: Run wrapper parity eval
        run: npm run eval:wrapper-parity

      - name: Run doctor
        run: node scripts/looppilot.mjs doctor --target both --json

      - name: Check package contents
        run: npm pack --dry-run
        env:
          npm_config_cache: /tmp/looppilot-npm-cache

      - name: Check whitespace
        run: git diff --check
