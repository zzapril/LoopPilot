name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify LoopPilot (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation suite
        run: npm test

      - name: Run wrapper parity eval
        run: npm run eval:wrapper-parity

      - name: Run doctor
        run: node scripts/looppilot.mjs doctor --target both --json

      - name: Check package contents
        run: npm pack --dry-run
        env:
          npm_config_cache: /tmp/looppilot-npm-cache

      - name: Check whitespace
        run: git diff --check
